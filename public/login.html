<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <meta name="theme-color" content="#16a34a"/>
  <title>Login – ReUse BMC</title>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="icon" href="/icon.svg"/>
  <link rel="stylesheet" href="/styles.css"/>
</head>
<body>
<div id="toast-container"></div>
<div class="app-shell">
  <div style="min-height:100vh; display:flex; flex-direction:column; justify-content:center; padding:24px; background: linear-gradient(160deg,#16a34a 0%,#166534 40%, #f0fdf4 40%);">
    <div style="text-align:center; margin-bottom:24px; color:white;">
      <div style="font-size:64px; margin-bottom:8px;">♻️</div>
      <h1 style="font-size:28px; font-weight:800; letter-spacing:-0.5px;">ReUse BMC</h1>
      <p style="font-size:13px; opacity:0.85; font-weight:500;">Donate. Reuse. Reduce Waste.</p>
    </div>
    <div class="card" style="margin-top:0;">
      <h2 style="font-size:18px; font-weight:700; margin-bottom:20px; color:#1f2937;">Welcome Back 👋</h2>
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrap">
          <span class="icon">✉️</span>
          <input type="email" id="email" placeholder="your@email.com"/>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <span class="icon">🔒</span>
          <input type="password" id="password" placeholder="Enter password"/>
        </div>
      </div>
      <div id="err-msg" style="color:#ef4444; font-size:13px; margin-bottom:12px; display:none;"></div>
      <button class="btn btn-primary" onclick="doLogin()" id="login-btn">
        Login
      </button>
      <p style="text-align:center; margin-top:16px; font-size:13px; color:#6b7280;">
        Don't have account? <a href="/register" style="color:#16a34a; font-weight:600;">Register</a>
      </p>
      <div style="margin-top:20px; padding-top:16px; border-top:1px solid #e5e7eb;">
        <p style="font-size:11px; color:#9ca3af; text-align:center; font-weight:500; margin-bottom:8px;">TEST CREDENTIALS</p>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px;">
          <button class="btn btn-gray btn-sm" onclick="fill('donor@test.com','donor123')">🏠 Donor</button>
          <button class="btn btn-gray btn-sm" onclick="fill('ngo@test.com','ngo123')">🤝 NGO</button>
          <button class="btn btn-gray btn-sm" onclick="fill('admin@bmc.gov.in','admin123')">🏛️ Admin</button>
          <button class="btn btn-gray btn-sm" onclick="fill('officer@bmc.gov.in','officer123')">👮 Officer</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="/app.js"></script>
<script>
  function fill(e, p) {
    document.getElementById('email').value = e;
    document.getElementById('password').value = p;
  }
  async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('err-msg');
    const btn = document.getElementById('login-btn');
    if (!email || !password) { showErr('Please fill all fields'); return; }
    btn.textContent = 'Logging in...'; btn.disabled = true;
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) { showErr(data.message); return; }
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      toast('Login successful! Welcome ' + data.user.name.split(' ')[0], 'success');
      setTimeout(() => {
        if (data.user.role === 'donor') window.location.href = '/donor';
        else if (data.user.role === 'ngo') window.location.href = '/ngo';
        else window.location.href = '/admin';
      }, 600);
    } catch(e) { showErr('Server error. Please try again.'); }
    finally { btn.textContent = 'Login'; btn.disabled = false; }
  }
  function showErr(msg) {
    const el = document.getElementById('err-msg');
    el.textContent = msg; el.style.display = 'block';
  }
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
