<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <meta name="theme-color" content="#16a34a"/>
  <title>NGO – ReUse BMC</title>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="icon" href="/icon.svg"/>
  <link rel="stylesheet" href="/styles.css"/>
</head>
<body>
<div id="toast-container"></div>
<div class="app-shell">

  <!-- HOME -->
  <div class="page active" id="page-home">
    <div class="header">
      <div class="header-row">
        <div>
          <p style="font-size:12px;opacity:0.8;">Welcome,</p>
          <h2 id="ngo-name">NGO 🤝</h2>
          <p>NGO Dashboard</p>
        </div>
        <button class="header-icon-btn" onclick="showPage('page-profile')">👤</button>
      </div>
    </div>
    <div class="scroll-content" style="margin-top:20px;">
      <div class="stats-row">
        <div class="stat-card"><div class="stat-icon">📋</div><div class="stat-num" id="s-avail">-</div><div class="stat-label">Available</div></div>
        <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-num" id="s-dist">-</div><div class="stat-label">Distributed</div></div>
        <div class="stat-card"><div class="stat-icon">🤝</div><div class="stat-num" id="s-mine">-</div><div class="stat-label">By Us</div></div>
      </div>
      <div class="section-heading">Items Ready for Distribution</div>
      <div class="tabs">
        <button class="tab active" onclick="filterNGO('all',this)">All</button>
        <button class="tab" onclick="filterNGO('clothes',this)">👕 Clothes</button>
        <button class="tab" onclick="filterNGO('books',this)">📚 Books</button>
        <button class="tab" onclick="filterNGO('utensils',this)">🍽️ Utensils</button>
        <button class="tab" onclick="filterNGO('toys',this)">🧸 Toys</button>
        <button class="tab" onclick="filterNGO('appliances',this)">📱 Appliances</button>
        <button class="tab" onclick="filterNGO('other',this)">📦 Other</button>
      </div>
      <div id="ngo-list"><div class="loading-wrap"><div class="spinner"></div></div></div>
    </div>
  </div>

  <!-- COMPLETED -->
  <div class="page" id="page-completed">
    <div class="header">
      <div class="header-row">
        <div><h2>Completed ✅</h2><p>Items distributed by your NGO</p></div>
      </div>
    </div>
    <div class="scroll-content" style="margin-top:20px;">
      <div id="comp-list"><div class="loading-wrap"><div class="spinner"></div></div></div>
    </div>
  </div>

  <!-- PROFILE -->
  <div class="page" id="page-profile">
    <div class="header"><div class="header-row"><div><h2>My Profile 👤</h2><p>NGO Account</p></div></div></div>
    <div class="scroll-content" style="margin-top:20px;">
      <div class="card" style="text-align:center;">
        <div class="avatar" id="p-avatar">N</div>
        <h3 id="p-name" style="font-size:18px;font-weight:700;"></h3>
        <p id="p-org" style="font-size:13px;color:#16a34a;font-weight:600;margin:4px 0;"></p>
        <p id="p-email" style="font-size:12px;color:#9ca3af;"></p>
        <span class="badge badge-listed" style="margin-top:6px;">🤝 NGO</span>
      </div>
      <div class="card">
        <div style="display:flex;flex-direction:column;gap:10px;">
          <div style="display:flex;align-items:center;gap:10px;font-size:14px;color:#4b5563;"><span style="font-size:20px;">📞</span><span id="p-phone">-</span></div>
          <div style="display:flex;align-items:center;gap:10px;font-size:14px;color:#4b5563;"><span style="font-size:20px;">📍</span><span id="p-addr">-</span></div>
        </div>
      </div>
      <button class="btn btn-danger" onclick="logout()" style="width:100%;margin-top:10px;">🚪 Logout</button>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item active" id="nav-home" onclick="showPage('page-home')"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></button>
    <button class="nav-item" id="nav-completed" onclick="showPage('page-completed')"><span class="nav-icon">✅</span><span class="nav-label">Completed</span></button>
    <button class="nav-item" id="nav-profile" onclick="showPage('page-profile')"><span class="nav-icon">👤</span><span class="nav-label">Profile</span></button>
  </nav>
</div>

<script src="/app.js"></script>
<script>
if (!requireAuth('ngo')) {}
const user = getUser();
let allNGOItems = [];
let currentFilter = 'all';

document.getElementById('ngo-name').textContent = (user?.organizationName || user?.name || 'NGO') + ' 🤝';
document.getElementById('p-name').textContent = user?.name || '';
document.getElementById('p-org').textContent = user?.organizationName || '';
document.getElementById('p-email').textContent = user?.email || '';
document.getElementById('p-phone').textContent = user?.phone || 'Not set';
document.getElementById('p-addr').textContent = user?.address || 'Not set';
document.getElementById('p-avatar').textContent = (user?.name||'N')[0].toUpperCase();

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const map = {'page-home':'nav-home','page-completed':'nav-completed','page-profile':'nav-profile'};
  if (map[id]) document.getElementById(map[id]).classList.add('active');
  if (id === 'page-home') loadNGOItems();
  if (id === 'page-completed') loadCompleted();
}

function filterNGO(cat, el) {
  currentFilter = cat;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderNGOList();
}

async function loadNGOItems() {
  try {
    const r = await api('/api/users/stats');
    if (r?.ok) {
      document.getElementById('s-avail').textContent = r.data.available || 0;
      document.getElementById('s-dist').textContent = r.data.distributed || 0;
      document.getElementById('s-mine').textContent = r.data.distributed || 0;
    }
    const rd = await api('/api/donations/for-ngo');
    if (rd?.ok) { allNGOItems = rd.data; renderNGOList(); }
  } catch(e) {}
}

function renderNGOList() {
  const el = document.getElementById('ngo-list');
  let items = allNGOItems;
  if (currentFilter !== 'all') items = items.filter(d => d.category === currentFilter);
  if (!items.length) { el.innerHTML = `<div class="empty-state"><div class="es-icon">🎉</div><h3>No items available</h3><p>All picked-up items have been assigned</p></div>`; return; }
  el.innerHTML = items.map(d => `
    <div class="donation-card">
      <div class="donation-card-top">
        <div><h4>${CAT_EMOJI[d.category]||'📦'} ${d.itemName}</h4><div class="cat">${d.category} · ${COND_LABEL[d.condition]||d.condition} · Qty: ${d.quantity||1}</div></div>
        ${statusBadge(d.status)}
      </div>
      ${d.photos?.length ? `<div style="display:flex;gap:6px;margin:8px 0;">${d.photos.slice(0,3).map(p=>`<img src="${p}" style="width:60px;height:60px;border-radius:8px;object-fit:cover;">`).join('')}</div>` : ''}
      <div class="meta">👤 Donor: ${d.donorName}</div>
      <div class="meta">📍 ${d.address}</div>
      <div class="meta">📅 Picked: ${fmtDate(d.pickedAt)}</div>
      ${d.location?.lat ? `<div class="meta"><a href="https://maps.google.com/?q=${d.location.lat},${d.location.lng}" target="_blank" style="color:#16a34a;font-size:12px;font-weight:600;">🗺️ Donor Location</a></div>` : ''}
      <div class="actions">
        <button class="btn btn-primary btn-sm" onclick="markDistributed('${d._id}')">✅ Mark Distributed</button>
      </div>
    </div>
  `).join('');
}

async function markDistributed(id) {
  const r = await api(`/api/donations/${id}/distribute`, { method: 'PUT' });
  if (r?.ok) { toast('Marked as distributed! 🎉', 'success'); loadNGOItems(); }
  else toast(r?.data?.message || 'Error', 'error');
}

async function loadCompleted() {
  const el = document.getElementById('comp-list');
  el.innerHTML = `<div class="loading-wrap"><div class="spinner"></div></div>`;
  const r = await api('/api/donations');
  if (!r?.ok) return;
  const items = r.data.filter(d => d.status === 'distributed' && d.ngoId === user.id);
  if (!items.length) { el.innerHTML = `<div class="empty-state"><div class="es-icon">📭</div><h3>No completed distributions yet</h3></div>`; return; }
  el.innerHTML = items.map(d => `
    <div class="donation-card">
      <div class="donation-card-top">
        <div><h4>${CAT_EMOJI[d.category]||'📦'} ${d.itemName}</h4><div class="cat">${d.category} · Qty: ${d.quantity||1}</div></div>
        ${statusBadge(d.status)}
      </div>
      <div class="meta">👤 ${d.donorName} → Distributed ${fmtDate(d.distributedAt)}</div>
    </div>
  `).join('');
}

loadNGOItems();
</script>
</body>
</html>
