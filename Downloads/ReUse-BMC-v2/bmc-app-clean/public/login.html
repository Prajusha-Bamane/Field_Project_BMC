<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login – ReUse BMC</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#064e3b,#065f46);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:white;border-radius:24px;padding:40px 32px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
  .logo{text-align:center;margin-bottom:28px}
  .logo-icon{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#064e3b,#10b981);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:2rem}
  .logo h1{font-size:1.6rem;font-weight:800;color:#111827}
  .logo p{color:#6b7280;font-size:0.9rem;margin-top:4px}
  .form-group{margin-bottom:16px}
  label{display:block;font-size:0.875rem;font-weight:600;color:#374151;margin-bottom:6px}
  input{width:100%;padding:12px 16px;border:2px solid #e5e7eb;border-radius:12px;font-size:1rem;transition:border-color 0.2s;outline:none}
  input:focus{border-color:#10b981}
  .btn{width:100%;padding:14px;background:linear-gradient(135deg,#064e3b,#10b981);color:white;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity 0.2s;margin-top:8px}
  .btn:hover{opacity:0.9}
  .btn:disabled{opacity:0.6;cursor:not-allowed}
  .error{background:#fef2f2;border:1px solid #fca5a5;color:#dc2626;border-radius:10px;padding:12px;font-size:0.875rem;margin-bottom:16px;display:none}
  .footer-links{text-align:center;margin-top:20px;font-size:0.875rem;color:#6b7280}
  .footer-links a{color:#064e3b;font-weight:600;text-decoration:none}
  .demo-accounts{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:14px;margin-bottom:20px;font-size:0.8rem}
  .demo-accounts h4{font-weight:700;color:#065f46;margin-bottom:8px;font-size:0.85rem}
  .demo-row{display:flex;justify-content:space-between;padding:3px 0;color:#374151}
  .demo-row b{color:#064e3b;cursor:pointer;text-decoration:underline}
  .back-link{display:block;text-align:center;margin-bottom:20px}
  .back-link a{color:#6b7280;text-decoration:none;font-size:0.875rem}
</style>
</head>
<body>
<div class="card">
  <div class="back-link"><a href="/">← Back to Home</a></div>
  <div class="logo">
    <div class="logo-icon">♻️</div>
    <h1>Welcome Back</h1>
    <p>Login to your ReUse BMC account</p>
  </div>

  <div class="demo-accounts">
    <h4>🔑 Demo Accounts (click to fill)</h4>
    <div class="demo-row"><span>Admin/BMC</span><b onclick="fill('admin@bmc.gov.in','admin123')">admin@bmc.gov.in</b></div>
    <div class="demo-row"><span>Donor</span><b onclick="fill('donor@test.com','donor123')">donor@test.com</b></div>
    <div class="demo-row"><span>NGO</span><b onclick="fill('ngo@test.com','ngo123')">ngo@test.com</b></div>
    <div class="demo-row"><span>Officer</span><b onclick="fill('officer@bmc.gov.in','officer123')">officer@bmc.gov.in</b></div>
  </div>

  <div class="error" id="errorMsg"></div>

  <div class="form-group">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
  </div>
  <button class="btn" id="loginBtn" onclick="login()">Login →</button>

  <div class="footer-links" style="margin-top:16px">
    Don't have an account? <a href="/register">Register here</a>
  </div>
</div>

<script>
function fill(e, p) {
  document.getElementById('email').value = e;
  document.getElementById('password').value = p;
}
async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('errorMsg');
  const btn = document.getElementById('loginBtn');
  errEl.style.display = 'none';
  if (!email || !password) { showErr('Please enter email and password'); return; }
  btn.disabled = true; btn.textContent = 'Logging in...';
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, password})
    });
    const data = await res.json();
    if (!res.ok) { showErr(data.message); btn.disabled=false; btn.textContent='Login →'; return; }
    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));
    if (data.user.role === 'admin') window.location.href = '/admin';
    else if (data.user.role === 'donor') window.location.href = '/donor';
    else if (data.user.role === 'ngo') window.location.href = '/ngo';
  } catch (e) { showErr('Connection error. Please try again.'); btn.disabled=false; btn.textContent='Login →'; }
}
function showErr(msg) { const e = document.getElementById('errorMsg'); e.textContent = msg; e.style.display = 'block'; }
document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
// If already logged in
const user = JSON.parse(localStorage.getItem('user') || 'null');
if (user) {
  if (user.role === 'admin') window.location.href = '/admin';
  else if (user.role === 'donor') window.location.href = '/donor';
  else if (user.role === 'ngo') window.location.href = '/ngo';
}
</script>
</body>
</html>
